<h2>楽曲製作者の一括設定</h2>
<form method="POST">
    <table>
        <tr>
            <th>曲名</th>
            <th>現在の製作者</th>
            <th>変更後の製作者</th>
        </tr>
        {% for song in songs %}
        <tr>
            <td>{{ song.name }}</td>
            <td>{{ song.creator }}</td>
            <td>
                <select name="creator_{{ song.song_id }}">
                    <option value="">-- 選択してください --</option>
                    {% for user in users %}
                    <option value="{{ user }}" {% if song.creator == user %}selected{% endif %}>
                        {{ user }}
                    </option>
                    {% endfor %}
                </select>
            </td>
        </tr>
        {% endfor %}
    </table>
    <button type="submit">一括保存する</button>
</form>
