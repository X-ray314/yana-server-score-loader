{% extends "base.html" %}

{% block title %}管理者メッセージ送信{% endblock %}

{% block extra_style %}
<style>
    .admin-card {
        background: rgba(30, 30, 30, 0.8);
        border: 2px solid var(--accent);
        border-radius: 15px;
        padding: 30px;
        max-width: 650px;
        margin: 50px auto;
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        color: var(--accent);
        font-weight: bold;
        font-size: 0.9rem;
    }

    select, input[type="text"], textarea {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #444;
        background: #222;
        color: white;
        font-family: inherit;
        box-sizing: border-box;
    }

    textarea {
        resize: vertical;
        min-height: 80px;
    }

    input[type="color"] {
        width: 100%;
        height: 45px;
        padding: 4px;
        border-radius: 8px;
        border: 1px solid #444;
        background: #222;
        cursor: pointer;
        box-sizing: border-box;
    }

    .color-row {
        display: flex;
        gap: 10px;
        align-items: flex-end;
    }

    .color-row .form-group {
        flex: 1;
    }

    .preset-colors {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 8px;
    }

    .preset-color-btn {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.4);
        cursor: pointer;
        transition: transform 0.2s;
    }

    .preset-color-btn:hover { transform: scale(1.2); }

    .row-2col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }

    .preview-area {
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid #444;
        border-radius: 8px;
        padding: 20px;
        text-align: center;
        min-height: 70px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #preview-text {
        font-weight: bold;
        word-break: break-all;
        white-space: pre-wrap;
        text-shadow: 2px 2px 2px black;
        transition: all 0.2s;
    }

    .send-btn {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 8px;
        background: var(--btn-grad);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.2s;
        font-size: 1rem;
        margin-top: 10px;
    }

    .send-btn:hover { transform: scale(1.02); }

    .section-title {
        color: #aaa;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin: 25px 0 15px;
        border-bottom: 1px solid #444;
        padding-bottom: 5px;
    }

    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
        color: white;
        cursor: pointer;
    }

    .checkbox-group input { width: auto; cursor: pointer; }

    .image-preview {
        max-width: 100%;
        max-height: 100px;
        border-radius: 8px;
        margin-top: 8px;
        display: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="admin-card">
    <h2 style="text-align: center; margin-top: 0;">🎛️ リアルタイム送信パネル</h2>
    <p style="text-align: center; font-size: 0.9em; color: #ccc;">指定したユーザーの画面にメッセージを流します</p>

    <!-- 送信先 -->
    <div class="form-group">
        <label>送信先ユーザー</label>
        <select id="target_user">
            <option value="">-- ユーザーを選択 --</option>
            {% for user in users %}
                <option value="{{ user.username }}">{{ user.username }}</option>
            {% endfor %}
        </select>
    </div>

    <p class="section-title">📝 コンテンツ</p>

    <!-- コンテンツタイプ -->
    <div class="form-group" style="display: none;">
        <label>種類</label>
        <select id="content_type" onchange="onContentTypeChange()">
            <option value="text">テキスト / 絵文字</option>
            <option value="image">画像 / GIF URL</option>
        </select>
    </div>

    <!-- テキスト入力 -->
    <div class="form-group" id="text-input-area">
        <label>メッセージ（複数行OK・絵文字OK）</label>
        <textarea id="message" placeholder="例：ナイススコア！🎉&#10;複数行も書けます"></textarea>
    </div>

    <!-- 画像URL入力 -->
    <div class="form-group" id="image-input-area" style="display:none;">
        <label>画像 / GIF の URL</label>
        <input type="text" id="image_url" placeholder="https://example.com/image.gif">
        <img id="image-preview" class="image-preview">
    </div>

    <p class="section-title">🎨 スタイル</p>

    <!-- 文字サイズ・速度 -->
    <div class="row-2col">
        <div class="form-group">
            <label>文字サイズ</label>
            <select id="font_size">
                <option value="1.2rem">極小</option>
                <option value="1.5rem">小</option>
                <option value="2rem" selected>中</option>
                <option value="3rem">大</option>
                <option value="5rem">特大</option>
                <option value="8rem">爆大</option>
            </select>
        </div>
        <div class="form-group">
            <label>流れる速度</label>
            <select id="anim_speed">
                <option value="10">超遅い</option>
                <option value="7">遅い</option>
                <option value="5" selected>普通</option>
                <option value="3">速い</option>
                <option value="1.5">激速</option>
                <option value="0.5">瞬速</option>
            </select>
        </div>
    </div>

    <!-- 文字色 -->
    <div class="form-group">
        <label>文字色</label>
        <input type="color" id="font_color" value="#ffffff">
        <div class="preset-colors">
            <div class="preset-color-btn" style="background:#ffffff" onclick="setColor('#ffffff')" title="白"></div>
            <div class="preset-color-btn" style="background:#00d4ff" onclick="setColor('#00d4ff')" title="シアン"></div>
            <div class="preset-color-btn" style="background:#ff00ff" onclick="setColor('#ff00ff')" title="ピンク"></div>
            <div class="preset-color-btn" style="background:#ffff00" onclick="setColor('#ffff00')" title="黄"></div>
            <div class="preset-color-btn" style="background:#ff4444" onclick="setColor('#ff4444')" title="赤"></div>
            <div class="preset-color-btn" style="background:#00ff88" onclick="setColor('#00ff88')" title="緑"></div>
            <div class="preset-color-btn" style="background:#ff8800" onclick="setColor('#ff8800')" title="オレンジ"></div>
        </div>
    </div>

    <!-- グラデーション -->
    <div class="form-group">
        <label class="checkbox-group">
            <input type="checkbox" id="use_gradient" onchange="updatePreview()">
            グラデーション文字を使う
        </label>
    </div>

    <div id="gradient-options" style="display:none;">
        <div class="row-2col">
            <div class="form-group">
                <label>グラデーション 色1</label>
                <input type="color" id="grad_color1" value="#00d4ff" oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label>グラデーション 色2</label>
                <input type="color" id="grad_color2" value="#ff00ff" oninput="updatePreview()">
            </div>
        </div>
    </div>

    <p class="section-title">✨ アニメーション・動き</p>

    <!-- 流れる方向 -->
    <div class="row-2col">
        <div class="form-group">
            <label>流れる方向</label>
            <select id="direction">
                <option value="left">右 → 左（通常）</option>
                <option value="right">左 → 右</option>
                <option value="down">上 → 下</option>
                <option value="up">下 → 上</option>
            </select>
        </div>
        <div class="form-group">
            <label>テキストアニメ</label>
            <select id="text_anim">
                <option value="none">なし</option>
                <option value="pulse">点滅</option>
                <option value="rainbow">レインボー</option>
            </select>
        </div>
    </div>

    <!-- 回転角度 -->
    <div class="form-group" style="display: none;">
        <label>傾き角度: <span id="rotate-val">0</span>°</label>
        <input type="range" id="rotate_deg" min="-45" max="45" value="0"
               oninput="document.getElementById('rotate-val').innerText=this.value; updatePreview();"
               style="width:100%; cursor:pointer;">
    </div>

    <p class="section-title">⚙️ オプション</p>

    <div class="form-group">
        <label class="checkbox-group">
            <input type="checkbox" id="keep_message">
            送信後も入力を保持する（連投モード）
        </label>
    </div>

    <!-- プレビュー -->
    <p class="section-title">👁️ プレビュー</p>
    <div class="preview-area">
        <span id="preview-text">サンプルテキスト</span>
    </div>

    <button id="send-button" class="send-btn">🚀 画面に流す！</button>
</div>
{% endblock %}

{% block extra_script %}
<style>
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
    @keyframes bounce-anim { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes shake-anim { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
    @keyframes rainbow-anim { 0%{filter:hue-rotate(0deg)} 100%{filter:hue-rotate(360deg)} }
</style>
<script>
    function setColor(hex) {
        document.getElementById('font_color').value = hex;
        updatePreview();
    }

    function onContentTypeChange() {
        const type = document.getElementById('content_type').value;
        document.getElementById('text-input-area').style.display = type === 'text' ? '' : 'none';
        document.getElementById('image-input-area').style.display = type === 'image' ? '' : 'none';
    }

    document.getElementById('use_gradient').addEventListener('change', function() {
        document.getElementById('gradient-options').style.display = this.checked ? '' : 'none';
        updatePreview();
    });

    document.getElementById('image_url').addEventListener('input', function() {
        const preview = document.getElementById('image-preview');
        preview.src = this.value;
        preview.style.display = this.value ? 'block' : 'none';
        updatePreview();
    });

    function updatePreview() {
        const type = document.getElementById('content_type').value;
        const preview = document.getElementById('preview-text');
        const useGrad = document.getElementById('use_gradient').checked;
        const color = document.getElementById('font_color').value;
        const size = document.getElementById('font_size').value;
        const rotate = document.getElementById('rotate_deg').value;
        const textAnim = document.getElementById('text_anim').value;

        if (type === 'image') {
            const url = document.getElementById('image_url').value;
            preview.innerHTML = url ? `<img src="${url}" style="max-height:60px; border-radius:4px;">` : '画像プレビュー';
            preview.style = '';
            return;
        }

        const msg = document.getElementById('message').value || 'サンプルテキスト';
        preview.innerText = msg;
        preview.style.fontSize = size;
        preview.style.transform = `rotate(${rotate}deg)`;
        preview.style.animation = '';
        preview.style.filter = '';

        if (useGrad) {
            const c1 = document.getElementById('grad_color1').value;
            const c2 = document.getElementById('grad_color2').value;
            preview.style.background = `linear-gradient(90deg, ${c1}, ${c2})`;
            preview.style.webkitBackgroundClip = 'text';
            preview.style.webkitTextFillColor = 'transparent';
            preview.style.backgroundClip = 'text';
            preview.style.color = '';
        } else {
            preview.style.background = '';
            preview.style.webkitBackgroundClip = '';
            preview.style.webkitTextFillColor = '';
            preview.style.backgroundClip = '';
            preview.style.color = color;
        }

        if (textAnim === 'pulse') preview.style.animation = 'pulse 1s infinite';
        else if (textAnim === 'bounce') preview.style.animation = 'bounce-anim 0.6s infinite';
        else if (textAnim === 'shake') preview.style.animation = 'shake-anim 0.3s infinite';
        else if (textAnim === 'rainbow') preview.style.animation = 'rainbow-anim 1s infinite';
    }

    // リアルタイムプレビュー更新
    ['message','font_size','font_color','anim_speed','direction','text_anim'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('input', updatePreview);
        if (el) el.addEventListener('change', updatePreview);
    });

    document.getElementById('send-button').addEventListener('click', () => {
        const target = document.getElementById('target_user').value;
        const type = document.getElementById('content_type').value;
        const msg = type === 'text'
            ? document.getElementById('message').value
            : document.getElementById('image_url').value;

        if (!target || !msg) {
            alert('ユーザーとコンテンツを入力してください');
            return;
        }

        const useGrad = document.getElementById('use_gradient').checked;

        socket.emit('send_admin_message', {
            target_user: target,
            message: msg,
            content_type: type,
            font_size: document.getElementById('font_size').value,
            font_color: document.getElementById('font_color').value,
            anim_speed: document.getElementById('anim_speed').value,
            direction: document.getElementById('direction').value,
            text_anim: document.getElementById('text_anim').value,
            rotate_deg: document.getElementById('rotate_deg').value,
            use_gradient: useGrad,
            grad_color1: document.getElementById('grad_color1').value,
            grad_color2: document.getElementById('grad_color2').value,
        });

        if (!document.getElementById('keep_message').checked) {
            if (type === 'text') document.getElementById('message').value = '';
            else document.getElementById('image_url').value = '';
        }

        console.log(`Sent to ${target}: ${msg}`);
    });
</script>
{% endblock %}
