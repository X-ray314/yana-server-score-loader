{% extends "base.html" %}

{% block title %}難易度選択・検索{% endblock %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Orbitron:wght@900&family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">

<div class="container-spare">
    <div class="header-section">
        <h2 class="title-main">Difficulty Selection</h2>
        <p class="user-info">挑戦する難易度を選択、または楽曲を検索してください</p>
    </div>

    <div class="search-section" style="margin-bottom: 40px; text-align: center; padding: 0 10px;">
        <input type="text" id="globalSearch" placeholder="全レベルから曲名を検索..." 
               style="width: 100%; max-width: 600px; box-sizing: border-box; padding: 15px 25px; background: rgba(0,0,0,0.6); border: 1px solid #ff66cc; border-radius: 50px; color: #fff; font-family: 'Exo 2'; outline: none; box-shadow: 0 0 15px rgba(255, 102, 204, 0.2); font-size: 1rem; transition: 0.3s; display: inline-block;">
    </div>

    <div id="levelSelectArea" class="level-grid">
        {% for lv in levels %}
        <a href="{{ url_for('song_list', level=lv) }}" class="level-card">
            <span class="lv-label">LEVEL</span>
            <span class="lv-num">{{ lv }}</span>
        </a>
        {% endfor %}
    </div>

    <div id="searchResults" style="display: none; background: rgba(255,255,255,0.02); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); overflow-x: auto;">
        <h3 style="color: #ff66cc; font-family: 'Orbitron'; margin-bottom: 20px; font-size: 1rem;">SEARCH RESULTS</h3>
        <table class="song-table" style="width: 100%; border-collapse: collapse; min-width: 400px;">
            <tbody id="searchResultBody">
            </tbody>
        </table>
    </div>

    <p style="text-align: center; margin-top: 30px;">
        <a href="{{ url_for('index') }}" class="back-link">← ホームに戻る</a>
    </p>
</div>

<style>
    /* box-sizingを一括適用してレイアウト崩れを防止 */
    *, *:before, *:after {
        box-sizing: border-box;
    }

    .container-spare {
        max-width: 900px;
        margin: 20px auto;
        padding: 40px;
        background: linear-gradient(135deg, rgba(0, 212, 255, 0.05) 0%, rgba(255, 0, 255, 0.05) 100%), rgba(20, 20, 20, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        font-family: 'Exo 2', sans-serif;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        color: #fff;
    }

    /* スマホ等の狭い画面での余白調整 */
    @media (max-width: 600px) {
        .container-spare { padding: 20px; }
        .title-main { font-size: 1.8rem; }
    }

    #globalSearch:focus {
        border-color: #00d4ff !important;
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.4) !important;
    }

    .header-section { text-align: center; margin-bottom: 40px; }
    .title-main { font-weight: 900; font-size: 2.5rem; color: #fff; letter-spacing: 2px; font-family: 'Orbitron', sans-serif; }

    .level-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 20px;
        padding: 10px;
    }

    .level-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(0, 212, 255, 0.3);
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        text-decoration: none;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .level-card:hover {
        background: rgba(0, 212, 255, 0.1);
        border-color: #00d4ff;
        transform: translateY(-5px);
        box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
    }

    .lv-label { font-size: 0.7rem; color: #00d4ff; font-weight: 800; letter-spacing: 2px; }
    .lv-num { 
        font-family: 'Orbitron', sans-serif; 
        font-size: 2.5rem; 
        color: #fff; 
        text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
    }

    .search-result-row td {
        padding: 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .search-song-name {
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        font-size: 1.1rem;
    }
    .search-song-name:hover { color: #00d4ff; }
    .star-badge {
        color: #ff66cc;
        font-family: 'Orbitron';
        font-weight: bold;
        min-width: 60px;
        display: inline-block;
    }
    .back-link { text-decoration: none; color: #00d4ff; font-weight: bold; }
</style>

<script>
function adjustLastCard() {
    const grid = document.querySelector('.level-grid');
    const cards = grid.querySelectorAll('.level-card');
    
    // グリッドの列数を取得
    const gridStyle = window.getComputedStyle(grid);
    const columnCount = gridStyle.getPropertyValue('grid-template-columns').split(' ').length;
    
    // 最後のカードをリセット
    cards[cards.length - 1].style.gridColumn = '';
    
    // カード数が列数で割り切れない（余りがある）場合
    if (cards.length % columnCount !== 0) {
        const lastCard = cards[cards.length - 1];
        lastCard.style.gridColumn = '1 / -1';  // 全列にまたがらせる
        lastCard.style.width = '220px';         // カード幅を固定
        lastCard.style.margin = '0 auto'; 
        lastCard.style.height = '116px';       // 中央寄せ
    }
}

// 初回実行
adjustLastCard();

// ウィンドウリサイズ時にも再計算
window.addEventListener('resize', adjustLastCard);
const allSongs = {{ all_songs | tojson }};
const searchInput = document.getElementById('globalSearch');
const levelArea = document.getElementById('levelSelectArea');
const resultArea = document.getElementById('searchResults');
const resultBody = document.getElementById('searchResultBody');

searchInput.addEventListener('input', function(e) {
    const term = e.target.value.toLowerCase();
    
    if (term.length === 0) {
        levelArea.style.display = 'grid';
        resultArea.style.display = 'none';
        return;
    }

    levelArea.style.display = 'none';
    resultArea.style.display = 'block';
    
    // 1. フィルタリング
    let filtered = allSongs.filter(s => 
        s.name.toLowerCase().includes(term) || 
        (s.creator && s.creator.toLowerCase().includes(term))
    );

    // 2. レベル順にソート (★の後の数字で比較)
filtered.sort((a, b) => {
        const isAQuestion = a.star.includes('?');
        const isBQuestion = b.star.includes('?');

        // 片方が '?' の場合の特別ルール
        if (isAQuestion && !isBQuestion) return 1;  // aを後ろへ
        if (!isAQuestion && isBQuestion) return -1; // bを後ろへ
        if (isAQuestion && isBQuestion) return 0;   // 両方 '?' ならそのまま

        // 両方数字の場合の昇順ルール
        const lvA = parseInt(a.star.replace(/[^0-9]/g, '')) || 0;
        const lvB = parseInt(b.star.replace(/[^0-9]/g, '')) || 0;
        
        if (lvA !== lvB) {
            return lvA - lvB; // 昇順 (1, 2, 3...)
        }
        
        // レベルが同じなら曲名順
        return a.name.localeCompare(b.name);
    });

    if (filtered.length === 0) {
        resultBody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:40px; color:#666;">一致する曲が見つかりませんでした</td></tr>';
        return;
    }

    // 3. 結果を描画
// 3. 結果を描画
resultBody.innerHTML = filtered.map(s => {
        const safeLevel = encodeURIComponent(s.level_num);
        // ID付きのURLを作成 (例: /songs/15#song-song_001)
        const targetUrl = `/songs/${safeLevel}#song-${s.song_id}`;
        
        return `
            <tr class="search-result-row">
                <td style="width: 100px;"><span class="star-badge">${s.star}</span></td>
                <td style="text-align: left;">
                    <a href="${targetUrl}" class="search-song-name">${s.name}</a>
                    <div style="font-size: 0.75rem; color: #888; margin-top: 4px;">
                        Maker: <span style="color: #eee;">${s.creator || 'Unknown'}</span> | 
                        Top: <span style="color: #ffcc00;">👑 ${s.top_user || '---'}</span>
                    </div>
                </td>
                <td style="text-align: right;">
                    <a href="/song/${s.song_id}" style="text-decoration:none; color:#00d4ff; font-size:0.8rem; border:1px solid #00d4ff; padding:4px 10px; border-radius:4px;">Ranking</a>
                </td>
            </tr>
        `;
    }).join('');
});
</script>
{% endblock %}
