{% extends "quiz/base.html" %}
{% block title %}設定を編集{% endblock %}

{% block content %}
<style>
    .setup-wrap { max-width: 500px; margin: 0 auto; }
    .setup-wrap h2 { font-size: 1.4rem; font-weight: 700; color: var(--text-main); margin: 0 0 24px; }
    .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; box-shadow: var(--shadow-sm); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .btn-submit {
        width: 100%; padding: 13px; background: var(--accent); color: white;
        border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 700;
        cursor: pointer; margin-top: 8px; transition: 0.15s; font-family: inherit;
    }
    .btn-submit:hover { background: var(--accent-dk); transform: translateY(-1px); }
    .btn-cancel {
        display: block; text-align: center; margin-top: 14px;
        color: var(--text-hint); text-decoration: none; font-size: 0.85rem; transition: color 0.15s;
    }
    .btn-cancel:hover { color: var(--text-sub); }
    .danger-zone {
        margin-top: 28px; padding: 20px; background: #fef2f2;
        border: 1px solid #fecaca; border-radius: 12px;
    }
    .danger-zone h3 { font-size: 0.88rem; font-weight: 700; color: var(--red); margin: 0 0 10px; }
    .danger-zone p  { font-size: 0.82rem; color: #b91c1c; margin: 0 0 14px; line-height: 1.6; }
    .btn-delete {
        width: 100%; padding: 11px; background: var(--red); color: white;
        border: none; border-radius: 10px; font-size: 0.88rem; font-weight: 700;
        cursor: pointer; transition: 0.15s; font-family: inherit;
    }
    .btn-delete:hover { background: #b91c1c; }
</style>

<div class="setup-wrap">
    <h2>設定を編集</h2>

    <div class="form-card">
        <form method="POST" enctype="multipart/form-data">

            <div class="field">
                <label>タイトル</label>
                <input type="text" name="title" value="{{ form.title }}" required>
            </div>

            <div class="field">
                <label>説明</label>
                <textarea name="description">{{ form.description or '' }}</textarea>
            </div>

            <div class="field-row">
                <div class="field">
                    <label>制限時間（秒）</label>
                    <input type="number" name="time_limit" value="{{ form.time_limit }}" min="0">
                    <p class="field-hint">0 で無制限</p>
                </div>
                <div class="field">
                    <label>結果画面</label>
                    <select name="show_answers">
                        <option value="1" {% if form.show_answers == 1 %}selected{% endif %}>正解を表示する</option>
                        <option value="0" {% if form.show_answers == 0 %}selected{% endif %}>スコアのみ表示</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label>アイコン画像（変更する場合のみ）</label>
                <input type="file" name="icon_image" accept="image/*"
                       style="font-size:0.84rem; color:var(--text-sub);">
            </div>

            <button type="submit" class="btn-submit">設定を保存する</button>
        </form>

        <a href="{{ url_for('quiz.edit_questions', form_id=form.id) }}" class="btn-cancel">
            キャンセルして戻る
        </a>
    </div>

    <!-- 危険ゾーン -->
    <div class="danger-zone">
        <h3>⚠️ 危険な操作</h3>
        <p>クイズを削除すると、すべての問題・スコアデータが完全に消えます。この操作は取り消せません。</p>
        <form method="POST" action="{{ url_for('quiz.delete_form', form_id=form.id) }}"
              onsubmit="return confirm('「{{ form.title }}」を完全に削除しますか？\nこの操作は取り消せません。')">
            <button type="submit" class="btn-delete">このクイズを完全に削除する</button>
        </form>
    </div>
</div>

{% endblock %}
