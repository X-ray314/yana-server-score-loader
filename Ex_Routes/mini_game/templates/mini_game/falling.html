<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Falling Items - Mini Game</title>
    <style>
        body { background: #f0f2f5; text-align: center; font-family: sans-serif; margin: 0; }
        canvas { background: #fff; border-bottom: 5px solid #333; cursor: none; }
        .back-link { display: block; margin-top: 20px; text-decoration: none; color: #4a90e2; }
    </style>
</head>
<body>
    <div style="font-size: 1.5rem; margin: 10px;">SCORE: <span id="score">0</span> | LIFE: <span id="life">❤️❤️❤️</span></div>
    <canvas id="game" width="400" height="500"></canvas>
    <a href="/mini_game/" class="back-link">← ミニゲーム一覧へ戻る</a>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let score = 0, life = 3, items = [], frame = 0, speed = 3;

canvas.addEventListener("mousemove", e => { player.x = e.offsetX - player.w/2; });

const player = { x: 180, y: 450, w: 40, h: 10 };

function update() {
    if(life <= 0) return;
    frame++;
    if(frame % Math.max(10, 30 - Math.floor(score/5)) === 0) {
        const isBonus = Math.random() < 0.2;
        items.push({ x: Math.random()*380, y: -20, r: 10, type: isBonus ? 'bonus' : 'enemy' });
    }

    ctx.clearRect(0,0,400,500);
    ctx.fillStyle = "#333"; ctx.fillRect(player.x, player.y, player.w, player.h);

    items.forEach((item, i) => {
        item.y += speed + (score/10);
        ctx.fillStyle = item.type === 'bonus' ? "#4a90e2" : "#e94e77";
        ctx.beginPath(); ctx.arc(item.x, item.y, item.r, 0, Math.PI*2); ctx.fill();

        if(item.y > 440 && item.x > player.x && item.x < player.x + player.w) {
            if(item.type === 'bonus') { score++; document.getElementById("score").innerText = score; }
            else { loseLife(); }
            items.splice(i, 1);
        } else if(item.y > 500) {
            items.splice(i, 1);
        }
    });

    requestAnimationFrame(update);
}

function loseLife() {
    life--;
    document.getElementById("life").innerText = "❤️".repeat(life);
    if(life <= 0) {
        alert("Game Over! Score: " + score);
        fetch('/mini_game/api/submit_score', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ game_name: 'falling', score: score })
        }).then(() => location.reload());
    }
}
update();
</script>
</body>
</html>
