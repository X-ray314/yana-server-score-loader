<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Jump Game - Mini Game</title>
    <style>
        body { background: #eef2f3; text-align: center; font-family: sans-serif; overflow: hidden; }
        canvas { background: skyblue; border: 2px solid #fff; border-radius: 10px; }
        .back-link { display: block; margin-top: 10px; text-decoration: none; color: #4a90e2; }
    </style>
</head>
<body>
    <div style="font-size: 1.5rem; margin: 10px;">DISTANCE: <span id="dist">0</span>m</div>
    <canvas id="game" width="600" height="300"></canvas>
    <p>SPACEキーでジャンプ！</p>
    <a href="/mini_game/" class="back-link">← ミニゲーム一覧へ戻る</a>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let distance = 0, gameActive = true;

const player = { x: 50, y: 200, w: 30, h: 30, dy: 0, jump: -12, gravity: 0.6, grounded: false };
let obstacles = [];

document.addEventListener("keydown", e => {
    if(e.code === "Space" && player.grounded) {
        player.dy = player.jump;
        player.grounded = false;
    }
});

function update() {
    if(!gameActive) return;

    // 物理計算
    player.dy += player.gravity;
    player.y += player.dy;
    if(player.y > 240) { player.y = 240; player.dy = 0; player.grounded = true; }

    // 障害物
    if(Math.random() < 0.02) obstacles.push({ x: 600, y: 240, w: 20, h: 30 });
    
    ctx.clearRect(0,0,600,300);
    ctx.fillStyle = "#8b4513"; ctx.fillRect(0, 270, 600, 30); // 地面
    ctx.fillStyle = "#ff6b6b"; ctx.fillRect(player.x, player.y, player.w, player.h);

    obstacles.forEach((ob, i) => {
        ob.x -= 5 + (distance/500);
        ctx.fillStyle = "#333"; ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
        
        // 衝突
        if(player.x < ob.x + ob.w && player.x + player.w > ob.x && player.y < ob.y + ob.h && player.y + player.h > ob.y) {
            gameOver();
        }
        if(ob.x < -20) obstacles.splice(i, 1);
    });

    distance++;
    document.getElementById("dist").innerText = Math.floor(distance/10);
    requestAnimationFrame(update);
}

function gameOver() {
    gameActive = false;
    const finalDist = Math.floor(distance/10);
    alert("Hit! Distance: " + finalDist + "m");
    fetch('/mini_game/api/submit_score', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ game_name: 'platformer', score: finalDist })
    }).then(() => location.reload());
}
update();
</script>
</body>
</html>
